<div class="container">
  <h2>Gestor de Solicitudes</h2>

  <div class="filters">
    <mat-form-field appearance="fill">
      <mat-label>Filtrar por Estado</mat-label>
      <mat-select [(ngModel)]="filtroActual" (selectionChange)="aplicarFiltro($event.value)">
        <mat-option value="Todos">Todos</mat-option>
        <mat-option *ngFor="let opcion of opcionesEstados" [value]="opcion.value">
          {{opcion.label}}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="mat-elevation-z8">
    <!-- Loading -->
    <app-loading *ngIf="loading$ | async" message="Sincronizando solicitudes..."></app-loading>

    <!-- Error -->
    <div *ngIf="error$ | async as error" class="error-message">
      {{ error }}
    </div>

    <!-- Wrapper para scroll horizontal responsivo -->
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" matSort>
        
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
          <td mat-cell *matCellDef="let element"> {{element.id}} </td>
        </ng-container>

        <!-- Nombre Column -->
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
          <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
        </ng-container>

        <!-- Tipo Column -->
        <ng-container matColumnDef="tipo">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Tipo </th>
          <td mat-cell *matCellDef="let element"> {{element.tipo}} </td>
        </ng-container>

        <!-- Estado Column -->
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Estado </th>
          <td mat-cell *matCellDef="let element">
            <span class="badge" [ngClass]="obtenerClaseEstado(element.estado)">
              {{element.estado}}
            </span>
          </td>
        </ng-container>

        <!-- Fecha Column -->
        <ng-container matColumnDef="fecha">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Fecha </th>
          <td mat-cell *matCellDef="let element"> {{element.fecha | date:'dd/MM/yyyy'}} </td>
        </ng-container>

        <!-- Acciones Column -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef> Cambiar Estado </th>
          <td mat-cell *matCellDef="let element">
            <mat-form-field appearance="outline" class="small-select">
              <mat-select [value]="element.estado" (selectionChange)="cambiarEstado(element, $event.value)">
                <mat-option *ngFor="let opcion of opcionesEstados" [value]="opcion.value">
                  {{opcion.label}}
                </mat-option>
              </mat-select>
            </mat-form-field>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="tableColumnas"></tr>
        <tr mat-row *matRowDef="let row; columns: tableColumnas;"></tr>
      </table>
    </div>

    <!-- Paginador -->
    <mat-paginator [pageSizeOptions]="opcionesPaginator" 
                   [pageSize]="opcionPaginatorDefault"
                   showFirstLastButtons 
                   aria-label="Seleccionar página de solicitudes">
    </mat-paginator>
  </div>
</div>
